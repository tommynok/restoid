name: Android Test-Signed Release

on:
  workflow_dispatch: # Кнопка ручного запуска

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: '.go-version'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VER=$(sed -n -E 's/.*ndkVersion = "(.*)".*/\1/p' app/build.gradle.kts | tr -d ' ')
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;$NDK_VER"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> "$GITHUB_ENV"

      - name: Build restic binaries
        run: |
          set -euo pipefail
          ./scripts/build_restic.sh

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Generate test keystore
        run: |
          set -euo pipefail
          KEYSTORE_PATH="$RUNNER_TEMP/test-signing.jks"
          keytool -genkey -v -keystore "$KEYSTORE_PATH" -storepass testpass123 -alias testalias -keypass testpass123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Test"
          echo "ANDROID_SIGNING_KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build release APKs (with test signature)
        env:
          ANDROID_SIGNING_STORE_PASSWORD: testpass123
          ANDROID_SIGNING_KEY_ALIAS: testalias
          ANDROID_SIGNING_KEY_PASSWORD: testpass123
        run: |
          ./gradlew --no-daemon clean assembleRelease

      - name: Upload Test-Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-signed-release-apks
          path: app/build/outputs/apk/**/*.apk
